<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>교육 출결 확인 | DL E&C</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── 상단 헤더 ── */
    .header {
      background: linear-gradient(135deg, #0d1f3c 0%, #1a3560 100%);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* DL E&C 로고 */
    .logo {
      display: flex;
      align-items: flex-start;
      gap: 2px;
    }

    .logo-dl {
      font-size: 26px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -1px;
      line-height: 1;
    }

    .logo-enc {
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      margin-top: 2px;
      letter-spacing: 0.5px;
      background: rgba(255,255,255,0.18);
      padding: 2px 5px;
      border-radius: 3px;
    }

    .header-title {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.5px;
    }

    /* ── 파란 구분선 ── */
    .accent-bar {
      height: 4px;
      background: linear-gradient(90deg, #1e5bb5, #2d7dd2);
    }

    /* ── 메인 컨텐츠 ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .card {
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 400px;
      overflow: hidden;
    }

    /* 카드 내부 타이틀 바 */
    .card-title-bar {
      background: #0d1f3c;
      padding: 14px 24px;
      border-left: 5px solid #2d7dd2;
    }

    .card-title-bar h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .card-title-bar .subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-top: 2px;
    }

    .card-body {
      padding: 28px 24px 24px;
    }

    /* 라벨 */
    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #0d1f3c;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    /* 입력 필드 */
    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border: 1px solid #d0d7e3;
      border-bottom: 2px solid #0d1f3c;
      border-radius: 0;
      outline: none;
      background: #f8f9fb;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    input[type="text"]:focus {
      background: #fff;
      border-bottom-color: #1e5bb5;
    }

    /* 구분선 */
    .divider {
      height: 1px;
      background: #e8ecf2;
      margin: 4px 0 20px;
    }

    /* 버튼 그룹 */
    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .btn {
      padding: 14px 8px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.5px;
    }

    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-in {
      background: #0d1f3c;
      color: #fff;
    }

    .btn-in:hover:not(:disabled) { background: #1a3560; }

    .btn-out {
      background: #fff;
      color: #0d1f3c;
      border: 2px solid #0d1f3c;
    }

    .btn-out:hover:not(:disabled) { background: #f0f2f5; }

    .save-hint {
      font-size: 11px;
      color: #a0a8b8;
      text-align: center;
    }

    /* 에러 */
    .error-msg {
      display: none;
      background: #fff0f0;
      color: #c0392b;
      border-left: 3px solid #c0392b;
      padding: 9px 12px;
      font-size: 12px;
      margin-bottom: 14px;
    }

    /* ── 결과 화면 ── */
    #result { display: none; }

    .result-body {
      padding: 32px 24px 28px;
      text-align: center;
    }

    .result-check {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .result-check.in  { background: #eef2ff; }
    .result-check.out { background: #e8f4fd; }

    .result-check svg { width: 28px; height: 28px; }

    .result-title {
      font-size: 20px;
      font-weight: 700;
      color: #0d1f3c;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }

    .result-sub {
      font-size: 12px;
      color: #9aa3b5;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    .result-info-box {
      background: #f8f9fb;
      border: 1px solid #e0e5ef;
      border-left: 3px solid #0d1f3c;
      padding: 16px;
      text-align: left;
      margin-bottom: 24px;
      border-radius: 2px;
    }

    .result-info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      padding: 7px 0;
      border-bottom: 1px solid #edf0f5;
      color: #1a2b4a;
    }

    .result-info-row:last-child { border-bottom: none; }
    .result-info-row .rk { color: #9aa3b5; font-size: 12px; font-weight: 600; }

    .btn-close {
      width: 100%;
      padding: 13px;
      font-size: 14px;
      font-weight: 700;
      background: #0d1f3c;
      color: #fff;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      letter-spacing: 0.5px;
    }

    /* ── 로고 ── */
    .logo-wrap {
      width: 100%;
      max-width: 400px;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <img src="https://raw.githubusercontent.com/dlencprocess/attendance-system/main/logo.png" alt="DL E&C" style="height:28px;" />
  <span class="header-title">교육 출결 시스템</span>
</div>
<div class="accent-bar"></div>

<!-- 메인 -->
<div class="main">
  <div class="card">

    <!-- 입력 화면 -->
    <div id="form-section">
      <div class="card-title-bar">
        <h1>교육 출결 확인</h1>
        <div class="subtitle" id="class-label">교육명 로딩 중...</div>
      </div>
      <div class="card-body">

        <label for="emp-id">사번</label>
        <input
          type="text"
          id="emp-id"
          placeholder="사번 입력"
          inputmode="numeric"
          autocomplete="off"
          maxlength="20"
        />

        <label for="emp-name">성명</label>
        <input
          type="text"
          id="emp-name"
          placeholder="이름 입력"
          autocomplete="off"
          maxlength="20"
        />

        <div class="error-msg" id="error-msg">사번과 성명을 모두 입력해주세요.</div>

        <div class="divider"></div>

        <div class="btn-group">
          <button class="btn btn-in"  onclick="submit('입실')">입실</button>
          <button class="btn btn-out" onclick="submit('퇴실')">퇴실</button>
        </div>

        <p class="save-hint">입력 정보는 이 기기에 자동 저장됩니다</p>
      </div>
    </div>

    <!-- 결과 화면 -->
    <div id="result">
      <div class="result-body">
        <div class="result-check" id="result-check">
          <!-- 아이콘은 JS에서 삽입 -->
        </div>
        <div class="result-title" id="result-title"></div>
        <div class="result-sub" id="result-sub"></div>
        <div class="result-info-box" id="result-info-box"></div>
        <button class="btn-close" onclick="window.close()">확인</button>
      </div>
    </div>

  </div>
</div>


<script>
  // ─── 설정 ─────────────────────────────────────────────
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx8ICusWWKSyBI1k2MzGOZ3VkAEgT2k1bvchkqRcBX2KjLPRc-ScABWD9CnHx3y_Ehy3A/exec';
  // ──────────────────────────────────────────────────────

  const input     = document.getElementById('emp-id');
  const nameInput = document.getElementById('emp-name');
  const errMsg    = document.getElementById('error-msg');
  const clsLabel  = document.getElementById('class-label');

  const params    = new URLSearchParams(window.location.search);
  const className = params.get('class') || '교육 출결';
  const urlToken  = parseInt(params.get('t') || '0', 10);
  clsLabel.textContent = className;

  // 토큰 유효성 검사 (30초 단위, ±1 허용)
  const TOKEN_SEC = 30;
  const nowToken  = Math.floor(Date.now() / (TOKEN_SEC * 1000));
  if (urlToken && nowToken !== urlToken) {
    document.getElementById('form-section').innerHTML =
      '<div style="padding:48px 24px;text-align:center;">' +
      '<div style="font-size:48px;margin-bottom:16px;">⏰</div>' +
      '<div style="font-size:17px;font-weight:700;color:#c0392b;margin-bottom:8px;">QR 코드가 만료되었습니다</div>' +
      '<div style="font-size:13px;color:#6b7a99;">강의실 화면의 QR을 다시 스캔해주세요.</div>' +
      '</div>';
  }

  const saved = localStorage.getItem('emp_id');
  if (saved) input.value = saved;
  const savedName = localStorage.getItem('emp_name');
  if (savedName) nameInput.value = savedName;

  function getDeviceId() {
    let id = localStorage.getItem('device_id');
    if (!id) {
      id = 'D-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8).toUpperCase();
      localStorage.setItem('device_id', id);
    }
    return id;
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') nameInput.focus();
  });

  async function submit(type) {
    const empId   = input.value.trim();
    const empName = nameInput.value.trim();

    if (!empId || !empName) {
      errMsg.style.display = 'block';
      if (!empId) input.focus();
      else nameInput.focus();
      return;
    }
    errMsg.style.display = 'none';

    localStorage.setItem('emp_id', empId);
    localStorage.setItem('emp_name', empName);

    document.querySelectorAll('.btn').forEach(b => b.disabled = true);

    const submitToken = Math.floor(Date.now() / (TOKEN_SEC * 1000));
    if (urlToken && submitToken !== urlToken) {
      document.getElementById('form-section').innerHTML =
        '<div style="padding:48px 24px;text-align:center;">' +
        '<div style="font-size:48px;margin-bottom:16px;">⏰</div>' +
        '<div style="font-size:17px;font-weight:700;color:#c0392b;margin-bottom:8px;">QR 코드가 만료되었습니다</div>' +
        '<div style="font-size:13px;color:#6b7a99;">강의실 화면의 QR을 다시 스캔해주세요.</div>' +
        '</div>';
      return;
    }

    const now   = new Date();
    const query = new URLSearchParams({
      emp_id   : empId,
      emp_name : empName,
      class    : className,
      type     : type,
      timestamp: now.toISOString(),
      t        : urlToken,
      device_id: getDeviceId()
    }).toString();

    await new Promise((resolve) => {
      const img = new Image();
      img.onload = img.onerror = resolve;
      img.src = APPS_SCRIPT_URL + '?' + query;
      setTimeout(resolve, 3000);
    });

    showResult(type, empId, empName, now);
  }

  function showResult(type, empId, empName, now) {
    document.getElementById('form-section').style.display = 'none';

    const isIn    = type === '입실';
    const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const dateStr = now.toLocaleDateString('ko-KR');

    const checkEl = document.getElementById('result-check');
    checkEl.className = 'result-check ' + (isIn ? 'in' : 'out');
    checkEl.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="#1e5bb5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

    document.getElementById('result-title').textContent = type + ' 완료';
    document.getElementById('result-sub').textContent   = dateStr + ' ' + timeStr;

    document.getElementById('result-info-box').innerHTML =
      `<div class="result-info-row"><span class="rk">성명</span><span>${empName}</span></div>` +
      `<div class="result-info-row"><span class="rk">사번</span><span>${empId}</span></div>` +
      `<div class="result-info-row"><span class="rk">교육명</span><span>${className}</span></div>`;

    document.getElementById('result').style.display = 'block';
  }
</script>

</body>
</html>
