<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교육 출결 관리자 | DL E&C</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── 상단 헤더 ── */
    .header {
      background: linear-gradient(135deg, #0d1f3c 0%, #1a3560 100%);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-right { text-align: right; }

    .header-title {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }

    .header-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    .accent-bar {
      height: 4px;
      background: linear-gradient(90deg, #1e5bb5, #2d7dd2);
    }

    /* ── 2분할 메인 레이아웃 ── */
    .main {
      flex: 1;
      padding: 28px 24px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      align-items: start;
    }

    /* ── 카드 ── */
    .card {
      background: #fff;
      border-radius: 2px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 20px;
      overflow: hidden;
    }

    .card:last-child { margin-bottom: 0; }

    .card-title-bar {
      background: #0d1f3c;
      padding: 12px 20px;
      border-left: 5px solid #2d7dd2;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-title-bar h2 {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .card-body { padding: 24px 20px; }

    /* ── 입력 ── */
    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #0d1f3c;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    input[type="text"] {
      width: 100%;
      padding: 11px 13px;
      font-size: 15px;
      border: 1px solid #d0d7e3;
      border-bottom: 2px solid #0d1f3c;
      border-radius: 0;
      outline: none;
      background: #f8f9fb;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 20px;
    }

    input[type="text"]:focus {
      background: #fff;
      border-bottom-color: #1e5bb5;
    }

    /* URL 미리보기 */
    .url-preview {
      background: #f0f2f5;
      border-left: 3px solid #1e5bb5;
      padding: 10px 14px;
      font-size: 11px;
      color: #1e5bb5;
      word-break: break-all;
      margin-bottom: 18px;
      min-height: 34px;
      font-family: monospace;
    }

    /* 생성 버튼 */
    .btn-generate {
      width: 100%;
      padding: 13px;
      font-size: 14px;
      font-weight: 700;
      background: #0d1f3c;
      color: #fff;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }

    .btn-generate:hover { background: #1a3560; }

    /* ── QR 새 창 열기 안내 ── */
    .qr-launch-box {
      display: none;
      align-items: center;
      gap: 14px;
      padding: 16px;
      background: #f0f4ff;
      border: 1px solid #c5d4f5;
      border-left: 3px solid #1e5bb5;
      margin-top: 12px;
      border-radius: 2px;
    }

    .qr-launch-box .launch-icon {
      font-size: 24px;
      flex-shrink: 0;
    }

    .qr-launch-info {
      flex: 1;
    }

    .qr-launch-info .launch-course {
      font-size: 13px;
      font-weight: 700;
      color: #0d1f3c;
      margin-bottom: 2px;
    }

    .qr-launch-info .launch-hint {
      font-size: 11px;
      color: #6b7a99;
    }

    .btn-reopen {
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 700;
      background: #1e5bb5;
      color: #fff;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-reopen:hover { background: #0d1f3c; }

    /* ── 우측 컬럼: 과정 목록이 전체 높이 채우기 ── */
    .col-right {
      display: flex;
      flex-direction: column;
    }

    .col-right .card {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .col-right .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    /* ── 교육 과정 목록 ── */
    .course-list-wrap {
      flex: 1;
      overflow-y: auto;
    }

    .course-loading,
    .course-empty {
      text-align: center;
      padding: 40px 24px;
      font-size: 13px;
      color: #9aa3b5;
    }

    .course-table {
      width: 100%;
      border-collapse: collapse;
    }

    .course-table th {
      font-size: 11px;
      font-weight: 700;
      color: #9aa3b5;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 10px 16px;
      border-bottom: 1px solid #e8ecf2;
      text-align: left;
      background: #fafbfc;
      position: sticky;
      top: 0;
    }

    .course-table td {
      padding: 13px 16px;
      font-size: 13px;
      color: #1a2b4a;
      border-bottom: 1px solid #f0f2f5;
      vertical-align: middle;
    }

    .course-table tr:last-child td { border-bottom: none; }
    .course-table tr:hover td { background: #fafbfc; }

    .course-table .course-name {
      font-weight: 700;
      color: #0d1f3c;
    }

    .course-table .course-count {
      font-size: 12px;
      color: #6b7a99;
      white-space: nowrap;
    }

    .course-table .course-date {
      font-size: 11px;
      color: #9aa3b5;
      white-space: nowrap;
    }

    .btn-send-mail {
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      background: #fff;
      color: #1e5bb5;
      border: 1.5px solid #1e5bb5;
      border-radius: 2px;
      cursor: pointer;
      letter-spacing: 0.3px;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .btn-send-mail:hover:not(:disabled) { background: #eef2ff; }
    .btn-send-mail:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-send-mail.sending { color: #9aa3b5; border-color: #9aa3b5; }
    .btn-send-mail.sent    { color: #2e7d32; border-color: #2e7d32; background: #f1f8f1; }
    .btn-send-mail.error   { color: #c0392b; border-color: #c0392b; background: #fff0f0; }

    .refresh-btn {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      background: none;
      border: none;
      cursor: pointer;
      letter-spacing: 0.3px;
      padding: 0;
    }

    .refresh-btn:hover { color: #fff; }

    .mail-hint {
      font-size: 11px;
      color: #9aa3b5;
      padding: 12px 16px;
      border-top: 1px solid #f0f2f5;
    }

    /* ── 푸터 ── */
    .footer {
      background: #0d1f3c;
      padding: 12px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-text { font-size: 10px; color: rgba(255,255,255,0.35); }

    /* ── 반응형: 좁은 화면에서는 세로 ── */
    @media (max-width: 760px) {
      .main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <img src="https://raw.githubusercontent.com/dlencprocess/attendance-system/main/logo.png" alt="DL E&C" style="height:28px;" />
  <div class="header-right">
    <div class="header-title">교육 출결 관리자</div>
    <div class="header-sub">QR은 30초마다 자동 갱신됩니다</div>
  </div>
</div>
<div class="accent-bar"></div>

<!-- 메인: 2분할 -->
<div class="main">

  <!-- ── 좌측: QR 생성 ── -->
  <div class="col-left">

    <!-- QR 생성 카드 -->
    <div class="card">
      <div class="card-title-bar">
        <h2>QR 코드 생성</h2>
      </div>
      <div class="card-body">
        <label>교육명 / 장소</label>
        <input type="text" id="class-name" placeholder="예: 안전교육, 신입사원 직무교육" oninput="updatePreview()" />

        <label>접속 URL 미리보기</label>
        <div class="url-preview" id="url-preview">교육명을 입력하면 URL이 표시됩니다</div>

        <button class="btn-generate" onclick="generateQR()">QR 코드 생성 (새 창)</button>

        <!-- QR 창 열림 안내 -->
        <div class="qr-launch-box" id="qr-launch-box">
          <div class="launch-icon">✅</div>
          <div class="qr-launch-info">
            <div class="launch-course" id="launch-course-name"></div>
            <div class="launch-hint">QR 창이 열렸습니다. 강의실 화면에 띄워두세요.</div>
          </div>
          <button class="btn-reopen" onclick="reopenQR()">다시 열기</button>
        </div>
      </div>
    </div>

  </div>

  <!-- ── 우측: 교육 과정 목록 ── -->
  <div class="col-right">
    <div class="card">
      <div class="card-title-bar">
        <h2>교육 과정별 출결 기록</h2>
        <button class="refresh-btn" onclick="loadCourseList()">↻ 새로고침</button>
      </div>
      <div class="card-body">
        <div class="course-list-wrap" id="course-list">
          <div class="course-loading">목록 불러오는 중...</div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- 푸터 -->
<div class="footer">
  <span class="footer-text">이 정보는 DL이앤씨의 자산입니다</span>
</div>

<script>
  // ─── 설정 ─────────────────────────────────────────────
  const BASE_URL        = 'https://attendance-system-nine-amber.vercel.app';
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx8ICusWWKSyBI1k2MzGOZ3VkAEgT2k1bvchkqRcBX2KjLPRc-ScABWD9CnHx3y_Ehy3A/exec';
  // ──────────────────────────────────────────────────────

  const TOKEN_SEC = 30;
  let qrWindow    = null;
  let lastClass   = '';

  // ── QR 생성 (새 창) ──────────────────────────────────

  function getBaseUrl()  { return BASE_URL.replace(/\/$/, ''); }
  function getClassName(){ return document.getElementById('class-name').value.trim(); }
  function getToken()    { return Math.floor(Date.now() / (TOKEN_SEC * 1000)); }

  function buildPreviewUrl() {
    const base = getBaseUrl();
    const cls  = getClassName();
    if (!base) return '';
    return base + '?' + new URLSearchParams({ class: cls || '출결시스템', t: getToken() }).toString();
  }

  function updatePreview() {
    const url = buildPreviewUrl();
    document.getElementById('url-preview').textContent = url || '교육명을 입력하면 URL이 표시됩니다';
  }

  function generateQR() {
    if (!getClassName()) {
      alert('교육명을 입력해주세요.');
      return;
    }
    lastClass = getClassName();
    openQRWindow();

    // 안내 박스 표시
    const box = document.getElementById('qr-launch-box');
    box.style.display = 'flex';
    document.getElementById('launch-course-name').textContent = lastClass;
  }

  function buildQRPageUrl() {
    return BASE_URL.replace(/\/$/, '') + '/qr.html?' +
      new URLSearchParams({ class: lastClass }).toString();
  }

  function openQRWindow() {
    // 기존 창이 열려 있으면 재사용, 닫혔으면 새로 열기
    if (qrWindow && !qrWindow.closed) {
      qrWindow.location.href = buildQRPageUrl();
      qrWindow.focus();
    } else {
      qrWindow = window.open(buildQRPageUrl(), 'qr-display',
        'width=900,height=650,toolbar=no,menubar=no,scrollbars=no');
    }
  }

  function reopenQR() {
    if (!lastClass) return;
    openQRWindow();
  }

  // ── 교육 과정 목록 ────────────────────────────────────

  async function loadCourseList() {
    const container = document.getElementById('course-list');
    container.innerHTML = '<div class="course-loading">목록 불러오는 중...</div>';

    try {
      const res  = await fetch(APPS_SCRIPT_URL + '?action=list');
      const data = await res.json();

      if (!data.success) {
        container.innerHTML = '<div class="course-empty">데이터를 불러올 수 없습니다.</div>';
        return;
      }

      if (!data.courses || data.courses.length === 0) {
        container.innerHTML = '<div class="course-empty">아직 출결 기록이 없습니다.<br><span style="font-size:11px;margin-top:6px;display:block;">QR 스캔 후 여기에 과정이 표시됩니다.</span></div>';
        return;
      }

      let html = '<table class="course-table"><thead><tr>' +
        '<th>교육 과정명</th><th>기록</th><th>최근 날짜</th><th></th>' +
        '</tr></thead><tbody>';

      data.courses.forEach((course, idx) => {
        html += `<tr>
          <td class="course-name">${escHtml(course.name)}</td>
          <td class="course-count">${course.count}건</td>
          <td class="course-date">${course.lastDate || '-'}</td>
          <td style="text-align:right;padding-right:16px;">
            <button class="btn-send-mail" id="send-btn-${idx}"
              onclick="sendMail('${escAttr(course.name)}', ${idx})">
              메일 발송
            </button>
          </td>
        </tr>`;
      });

      html += '</tbody></table>';
      container.innerHTML = html;

    } catch (err) {
      container.innerHTML = '<div class="course-empty">오류: ' + escHtml(err.message) + '</div>';
    }
  }

  async function sendMail(courseName, idx) {
    const btn = document.getElementById('send-btn-' + idx);
    if (!btn || btn.disabled) return;

    if (!confirm('"' + courseName + '" 출결 기록을 이메일로 발송할까요?')) return;

    btn.disabled = true;
    btn.classList.add('sending');
    btn.textContent = '발송 중...';

    try {
      const url = APPS_SCRIPT_URL + '?' + new URLSearchParams({ action: 'send', course: courseName }).toString();
      const res  = await fetch(url);
      const data = await res.json();

      if (data.success) {
        btn.classList.remove('sending');
        btn.classList.add('sent');
        btn.textContent = '발송 완료 ✓';
        setTimeout(() => {
          btn.disabled = false;
          btn.classList.remove('sent');
          btn.textContent = '메일 발송';
        }, 4000);
      } else {
        btn.classList.remove('sending');
        btn.classList.add('error');
        btn.textContent = '오류';
        btn.disabled = false;
        alert('발송 실패: ' + (data.error || '알 수 없는 오류'));
        setTimeout(() => { btn.classList.remove('error'); btn.textContent = '메일 발송'; }, 3000);
      }
    } catch (err) {
      btn.classList.remove('sending');
      btn.classList.add('error');
      btn.textContent = '오류';
      btn.disabled = false;
      alert('네트워크 오류: ' + err.message);
      setTimeout(() => { btn.classList.remove('error'); btn.textContent = '메일 발송'; }, 3000);
    }
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escAttr(str) {
    return String(str).replace(/'/g, "\\'");
  }

  loadCourseList();
</script>

<!-- 인쇄 스타일 -->
<style>
  @media print {
    body { background: #fff; }
    * { display: none !important; }
  }
</style>

</body>
</html>
